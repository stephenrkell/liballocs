version: 2.0
jobs:
  build:
    docker:
      - image: ubuntu:24.04
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            dpkg --add-architecture i386
            apt update
            DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt install -y \
             $(cat .circleci/build-dependencies.txt)
      - run:
          name: Update submodules
          command: git submodule update --init --recursive
      - run:
          name: Build submodules
          command: make -C contrib -j 2
          no_output_timeout: 1h
      - run:
          name: Build project
          command: |
            . contrib/env.sh
            ./autogen.sh
            ./configure
            make -j 2
      - run:
          name: Run library unit test (lib-test)
          command: make -C tests checkrun-lib-test
      #- run: # now our glibc is built with DWARF 5, so don't do this
      #    name: Create liballocs metadata
      #    no_output_timeout: 25m
      #    command: |
      #      mkdir -p /usr/lib/meta && \
      #      make -f tools/Makefile.meta \
      #          $(for libname in `ldd /bin/true | sed -En '/[[:blank:]]*([^[:blank:]]* => )?(.*) \(0x[0-9a-f]+\)/ {s//\2/;p}' | egrep 'libc\.so\.6|ld-linux.*\.so' | xargs readlink -f`; do echo "/usr/lib/meta${libname}-meta.so"; done)
      - persist_to_workspace:
          root: /
          paths: root/project usr/lib/meta
  test:
    requires:
      - build
    docker:
      - image: ubuntu:24.04
    steps:
      - checkout
      - attach_workspace:
          at: /
      - run:
          name: Install dependencies
          # We use 'clang' for some tests, so need that
          command: |
            apt update
            DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt install -y \
              $(cat .circleci/test-dependencies.txt)
      - run:
          name: Run tests
          command: make -C /root/project/tests -k SKIP_CASES=lib-test

workflows:
  version: 2
  default:
    jobs:
      - build
      - test:
          requires:
            - build
